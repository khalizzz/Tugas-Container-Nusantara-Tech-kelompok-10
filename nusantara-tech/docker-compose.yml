version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: nusantara_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nusantara-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: nusantara_minio
    restart: unless-stopped
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ':9001'
    volumes:
      - minio_data:/data
    ports:
      - "9010:9000"
      - "9011:9001"
    networks:
      - nusantara-network

  app:
    build: ./app
    container_name: nusantara_app
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - nusantara-network

  nginx:
    image: nginx:alpine
    container_name: nusantara_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - nusantara-network

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local

networks:
  nusantara-network:
    driver: bridge
